server:
  port: 8080

spring:
  application:
    name: student-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.student.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.student.mapper: debug
