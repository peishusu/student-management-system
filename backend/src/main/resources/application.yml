server:
  port: 8080

spring:
  application:
    name: student-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/student_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: 10m
      cache-null-values: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.student.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET:student-management-local-dev-secret-change-before-production}
    expire-minutes: 120

logging:
  level:
    com.example.student.mapper: debug
